<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Shark Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #000000;
      --bg-elevated: #0a0a0a;
      --surface: #111111;
      --surface-hover: #1a1a1a;
      --border: #222222;
      --border-hover: #333333;
      --accent: #ffffff;
      --accent-dim: #888888;
      --text: #ffffff;
      --text-muted: #666666;
      --text-dim: #444444;
      --danger: #ff4444;
      --success: #00ff88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Header */
    header {
      width: 100%;
      max-width: 680px;
      padding: 32px 24px 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .title-group h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .title-group p {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 100px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.4s ease;
    }

    .status-dot.online {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Main */
    main {
      width: 100%;
      max-width: 680px;
      padding: 24px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    /* Orb */
    .orb-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 8px;
    }

    .orb-container {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--border);
      transition: all 0.4s ease;
    }

    .orb-ring-2 {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid var(--border);
      opacity: 0.5;
      transition: all 0.4s ease;
    }

    .orb {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
      filter: grayscale(100%) brightness(2);
    }

    .orb:hover {
      border-color: var(--border-hover);
      transform: scale(1.03);
    }

    .orb:active { transform: scale(0.97); }

    .orb.listening {
      border-color: var(--danger);
      animation: orbPulse 1.2s ease-in-out infinite;
    }

    .orb.thinking {
      border-color: var(--accent);
      animation: orbSpin 2s linear infinite;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,68,68,0); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,68,68,0.2); }
    }

    @keyframes orbSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .orb-label {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 16px;
      transition: color 0.3s ease;
    }

    .orb-label.active { color: var(--accent); }
    .orb-label.recording { color: var(--danger); }

    /* Chat */
    .chat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      min-height: 200px;
      max-height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-card::-webkit-scrollbar { width: 4px; }
    .chat-card::-webkit-scrollbar-track { background: transparent; }
    .chat-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: msgIn 0.3s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .msg.shark .msg-avatar {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .msg-body { flex: 1; min-width: 0; }

    .msg-name {
      font-size: 0.6rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .msg.user .msg-name { color: var(--text-muted); }
    .msg.shark .msg-name { color: var(--accent); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .msg.user .msg-bubble {
      color: var(--text-muted);
    }

    .msg.shark .msg-bubble {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .msg-time {
      font-size: 0.55rem;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      margin-top: 4px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 40px 0;
      text-align: center;
    }

    .empty-state .shark-icon {
      font-size: 2.5rem;
      opacity: 0.2;
      filter: grayscale(100%) brightness(2);
    }

    /* Input */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-card:focus-within { border-color: var(--border-hover); }

    .mic-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .mic-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .mic-btn.recording {
      border-color: var(--danger);
      color: var(--danger);
      animation: micPulse 0.8s ease-in-out infinite;
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
      50% { box-shadow: 0 0 0 6px rgba(255,68,68,0.1); }
    }

    .text-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    .text-input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      font-weight: 600;
    }

    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }

    /* Quick Commands */
    .quick-section { padding: 4px 0; }

    .quick-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .quick-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }

    .quick-toggle {
      font-size: 0.7rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    .quick-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 100px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .quick-grid.expanded { max-height: 400px; }

    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .quick-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface-hover);
    }

    .quick-btn:active { transform: scale(0.95); }

    /* Typing */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 8px 12px;
    }

    .typing-indicator.visible { display: flex; }

    .typing-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 0 20px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* Mobile */
    @media (max-width: 480px) {
      header { padding: 20px 14px 0; }
      .logo-wrap { width: 38px; height: 38px; font-size: 1.3rem; }
      .title-group h1 { font-size: 1rem; }
      .orb-container { width: 120px; height: 120px; }
      .orb { width: 100px; height: 100px; font-size: 2.8rem; }
      .chat-card { min-height: 150px; max-height: 280px; padding: 12px; }
      .msg-bubble { padding: 8px 12px; font-size: 0.85rem; }
      .input-card { padding: 8px; }
      .mic-btn, .send-btn { width: 36px; height: 36px; }
    }

    @media (max-width: 360px) {
      .orb-container { width: 100px; height: 100px; }
      .orb { width: 82px; height: 82px; font-size: 2.2rem; }
    }

    /* Landscape */
    @media (max-height: 500px) and (orientation: landscape) {
      .orb-section { padding: 8px 0; }
      .orb-container { width: 80px; height: 80px; }
      .orb { width: 64px; height: 64px; font-size: 1.6rem; }
      .chat-card { max-height: 120px; min-height: 80px; }
    }

    ::selection {
      background: rgba(255,255,255,0.15);
      color: var(--text);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
<base target="_blank">
</head>
<body>

<header>
  <div class="logo-wrap">&#129416;</div>
  <div class="title-group">
    <h1>Shark Assistant</h1>
    <p>Voice AI</p>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">connecting</span>
  </div>
</header>

<main>

  <div class="orb-section">
    <div class="orb-container">
      <div class="orb-ring" id="orbRing"></div>
      <div class="orb-ring-2" id="orbRing2"></div>
      <div class="orb" id="orb" onclick="startVoice()">&#129416;</div>
    </div>
    <p class="orb-label" id="orbLabel">Tap to speak</p>
  </div>

  <div class="chat-card" id="chatLog">
    <div class="empty-state" id="emptyState">
      <div class="shark-icon">&#129416;</div>
      <div>Shark is ready<br><span style="font-size:0.75rem;opacity:0.5">Type or tap the orb</span></div>
    </div>
  </div>

  <div class="input-card">
    <button class="mic-btn" id="micBtn" onclick="startVoice()">&#127908;</button>
    <input
      class="text-input"
      id="textInput"
      type="text"
      placeholder="Type a command..."
      autocomplete="off"
      onkeydown="if(event.key==='Enter') sendText()"
    />
    <button class="send-btn" onclick="sendText()">&#10148;</button>
  </div>

  <div class="quick-section">
    <div class="quick-header">
      <span class="quick-label">Quick Commands</span>
      <button class="quick-toggle" id="quickToggle" onclick="toggleQuick()">Show all</button>
    </div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

</main>

<footer>Shark Assistant &middot; Python + Flask</footer>

<script>
  const BACKEND = "http://127.0.0.1:5000";

  const quickCommands = [
    "open google", "open youtube", "open github", "open chatgpt",
    "tell me a joke", "time in dubai", "date in pakistan",
    "play skyfall", "latest news", "weather in london",
    "who are you", "motivate me", "random fact", "help"
  ];

  let isQuickExpanded = false;

  const grid = document.getElementById("quickGrid");
  quickCommands.forEach(cmd => {
    const b = document.createElement("button");
    b.className = "quick-btn";
    b.textContent = cmd;
    b.onclick = () => sendCommand(cmd);
    grid.appendChild(b);
  });

  function toggleQuick() {
    isQuickExpanded = !isQuickExpanded;
    grid.classList.toggle('expanded', isQuickExpanded);
    document.getElementById('quickToggle').textContent = isQuickExpanded ? 'Show less' : 'Show all';
  }

  async function checkStatus() {
    try {
      const r = await fetch(BACKEND + "/status");
      if (r.ok) {
        document.getElementById("statusDot").classList.add("online");
        document.getElementById("statusText").textContent = "online";
      }
    } catch {
      document.getElementById("statusText").textContent = "offline";
    }
  }
  checkStatus();
  setInterval(checkStatus, 15000);

  function formatTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMsg(role, text) {
    const log = document.getElementById("chatLog");
    document.getElementById("emptyState")?.remove();

    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    wrap.innerHTML = `
      <div class="msg-avatar">${role === "user" ? "&#128100;" : "&#129416;"}</div>
      <div class="msg-body">
        <div class="msg-name">${role === "user" ? "You" : "Shark"}</div>
        <div class="msg-bubble">${escHtml(text)}</div>
        <div class="msg-time">${formatTime()}</div>
      </div>`;
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function showTyping() {
    const log = document.getElementById("chatLog");
    document.getElementById("emptyState")?.remove();

    const wrap = document.createElement("div");
    wrap.className = "msg shark";
    wrap.id = "typingMsg";
    wrap.innerHTML = `
      <div class="msg-avatar">&#129416;</div>
      <div class="msg-body">
        <div class="msg-name">Shark</div>
        <div class="msg-bubble typing-indicator visible">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function hideTyping() {
    document.getElementById("typingMsg")?.remove();
  }

  function setOrb(state) {
    const orb = document.getElementById("orb");
    const label = document.getElementById("orbLabel");
    const ring = document.getElementById("orbRing");
    const ring2 = document.getElementById("orbRing2");

    orb.className = "orb";
    label.className = "orb-label";
    ring.style.borderColor = "var(--border)";
    ring2.style.borderColor = "var(--border)";

    if (state === "listening") {
      orb.classList.add("listening");
      label.textContent = "Listening...";
      label.classList.add("recording");
      ring.style.borderColor = "var(--danger)";
      ring2.style.borderColor = "var(--danger)";
    } else if (state === "thinking") {
      orb.classList.add("thinking");
      label.textContent = "Processing...";
      label.classList.add("active");
      ring.style.borderColor = "var(--accent)";
      ring2.style.borderColor = "var(--accent)";
    } else {
      label.textContent = "Tap to speak";
    }
  }

  function sendText() {
    const inp = document.getElementById("textInput");
    const txt = inp.value.trim();
    if (!txt) return;
    inp.value = "";
    sendCommand(txt);
  }

  async function sendCommand(text) {
    appendMsg("user", text);
    showTyping();
    setOrb("thinking");

    try {
      const r = await fetch(BACKEND + "/command", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
      });
      const data = await r.json();

      hideTyping();
      setOrb("idle");
      appendMsg("shark", data.response);
      speak(data.response);

      if (data.action === "open_url") {
        setTimeout(() => window.open(data.url, "_blank"), 800);
      } else if (data.action === "exit") {
        setTimeout(() => appendMsg("shark", "&#128075; See you next time!"), 500);
      }
    } catch (err) {
      hideTyping();
      setOrb("idle");
      appendMsg("shark", "Could not connect. Make sure Flask is running on port 5000.");
    }
  }

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/[\u{1F300}-\u{1F9FF}]/gu, "").replace(/[\u{2600}-\u{26FF}]/gu, "").replace(/[\u{2700}-\u{27BF}]/gu, "");
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate = 1.05;
    utt.pitch = 1.0;
    utt.volume = 1;
    window.speechSynthesis.speak(utt);
  }

  let recognition = null;
  let isListening = false;

  function startVoice() {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) {
      appendMsg("shark", "Voice not supported. Use Chrome or Edge.");
      return;
    }

    if (isListening) {
      recognition?.stop();
      return;
    }

    recognition = new SpeechRec();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.continuous = false;

    recognition.onstart = function() {
      isListening = true;
      setOrb("listening");
      document.getElementById("micBtn").classList.add("recording");
    };

    recognition.onresult = function(e) {
      const transcript = e.results[0][0].transcript;
      sendCommand(transcript);
    };

    recognition.onerror = function(e) {
      if (e.error !== 'aborted') {
        appendMsg("shark", "Voice error: " + e.error);
      }
    };

    recognition.onend = function() {
      isListening = false;
      setOrb("idle");
      document.getElementById("micBtn").classList.remove("recording");
    };

    recognition.start();
  }

  window.addEventListener('load', function() {
    setTimeout(function() {
      appendMsg("shark", "Welcome! I'm Shark, your voice assistant.\n\nTry:\n- Open YouTube\n- Tell me a joke\n- Time in Dubai\n- Play skyfall\n- Help for more");
    }, 600);
  });

  if (window.innerWidth > 768) {
    window.addEventListener('load', function() {
      setTimeout(function() { document.getElementById('textInput').focus(); }, 1000);
    });
  }
</script>
</body>
</html>
